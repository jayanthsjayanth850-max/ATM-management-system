<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Software</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="calculator-wrapper">
            <h1>Calculator Software</h1>
            
            <div class="calculator">
                <div class="display">
                    <input type="text" id="display" readonly placeholder="0">
                    <div class="expression" id="expression"></div>
                </div>
                
                <div class="buttons">
                    <!-- Row 1 -->
                    <button class="btn btn-function" onclick="clearDisplay()">AC</button>
                    <button class="btn btn-function" onclick="deleteLast()">DEL</button>
                    <button class="btn btn-function" onclick="appendOperator('%')">%</button>
                    <button class="btn btn-operator" onclick="appendOperator('/')">&divide;</button>
                    
                    <!-- Row 2 -->
                    <button class="btn" onclick="appendNumber('7')">7</button>
                    <button class="btn" onclick="appendNumber('8')">8</button>
                    <button class="btn" onclick="appendNumber('9')">9</button>
                    <button class="btn btn-operator" onclick="appendOperator('*')">&times;</button>
                    
                    <!-- Row 3 -->
                    <button class="btn" onclick="appendNumber('4')">4</button>
                    <button class="btn" onclick="appendNumber('5')">5</button>
                    <button class="btn" onclick="appendNumber('6')">6</button>
                    <button class="btn btn-operator" onclick="appendOperator('-')">-</button>
                    
                    <!-- Row 4 -->
                    <button class="btn" onclick="appendNumber('1')">1</button>
                    <button class="btn" onclick="appendNumber('2')">2</button>
                    <button class="btn" onclick="appendNumber('3')">3</button>
                    <button class="btn btn-operator" onclick="appendOperator('+')">+</button>
                    
                    <!-- Row 5 -->
                    <button class="btn btn-zero" onclick="appendNumber('0')">0</button>
                    <button class="btn" onclick="appendNumber('.')">.</button>
                    <button class="btn btn-equals" onclick="calculate()">=</button>
                </div>
            </div>
            
            <div class="history">
                <h3>History</h3>
                <div id="history-list" class="history-list"></div>
                <button class="btn-clear-history" onclick="clearHistory()">Clear History</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
